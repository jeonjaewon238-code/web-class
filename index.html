<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>모모 디저트랩</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background-color: #fff8f5;
      color: #333;
    }
    header {
      background-color: #ff9aa2;
      padding: 20px;
      text-align: center;
      color: white;
    }
    .container {
      padding: 20px;
      text-align: center;
    }
    .products {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .card {
      background: white;
      border-radius: 15px;
      padding: 15px;
      width: 220px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .card img {
      width: 100%;
      border-radius: 10px;
    }
    .card h3 {
      margin: 10px 0 5px;
    }
    .btn {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 25px;
      background-color: #ff6f61;
      color: white;
      text-decoration: none;
      border-radius: 25px;
      font-weight: bold;
      transition: 0.3s;
    }
    .btn:hover {
      background-color: #ff3b2e;
    }
    footer {
      margin-top: 40px;
      padding: 15px;
      background: #ffe0dc;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>
